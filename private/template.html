<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/daily-brief/css/style.css">
  <style>
    .important { color: #dc2626; font-weight: 700; }
    .private-badge {
      display: inline-block;
      font-size: 11px;
      background: #fef2f2;
      color: #dc2626;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="site-header">

        私密板块

      <div class="article-header">
        <div class="article-date">{{DATE}}</div>
        <h2>{{TITLE}} <span class="private-badge">🔒 私密</span></h2>
      </div>
      <div class="article-body">
        {{CONTENT}}
      </div>
    </article>

    <footer class="site-footer">
      <p>© 2026 链研观察 · 内容仅供参考，不构成投资建议</p>
      <p style="margin-top:4px;"><a href="/daily-brief/private/" style="color:var(--accent);text-decoration:none;">← 返回私密首页</a></p>
    </footer>
