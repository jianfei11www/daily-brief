<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链研观察 — 区块链热点、全球宏观 · 科技前沿</title>
  <meta name="description" content="独立分析师视角 · 区块链热点、全球宏观 · 科技前沿 · 每日更新">
  <link rel="stylesheet" href="/daily-brief/css/style.css">
  <style>
    .section-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      flex-wrap: wrap;
    }
    .section-tabs .tab {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
    }
    .section-tabs .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .section-tabs .tab:hover {
      border-color: var(--accent);
    }
    .section-content { display: none; }
    .section-content.active { display: block; }
    .private-sections { display: none; }
    .private-sections.show { display: block; }
    .lock-badge {
      font-size: 11px;
      background: #fef2f2;
      color: #dc2626;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="site-header">
      <h1><a href="/daily-brief/">链研观察</a></h1>
      <div class="subtitle">
        独立分析师视角
        <span>·</span>
        区块链热点、全球宏观 · 科技前沿
        <span>·</span>
        每日更新
      </div>
    </header>

    <main>
      <!-- 板块导航（私密板块仅密钥用户可见） -->
      <div class="section-tabs" id="tabs">
        <a class="tab active" data-section="brief">📊 每日简报</a>
        <span class="private-sections" id="private-tabs">
          <a class="tab" data-section="chain">🔗 链上热点 <span class="lock-badge">🔒</span></a>
          <a class="tab" data-section="launch">🚀 新币融资 <span class="lock-badge">🔒</span></a>
          <a class="tab" data-section="hkipo">🇭🇰 港股打新 <span class="lock-badge">🔒</span></a>
        </span>
      </div>

      <!-- 每日简报（公开） -->
      <div class="section-content active" id="section-brief">
        <ul class="post-list" id="post-list">
        </ul>
      </div>

      <!-- 链上热点（私密） -->
      <div class="section-content private-sections" id="section-chain">
        <ul class="post-list" id="chain-list">
        </ul>
      </div>

      <!-- 新币融资（私密） -->
      <div class="section-content private-sections" id="section-launch">
        <ul class="post-list" id="launch-list">
        </ul>
      </div>

      <!-- 港股打新（私密） -->
      <div class="section-content private-sections" id="section-hkipo">
        <ul class="post-list" id="hkipo-list">
        </ul>
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2026 链研观察 · 内容仅供参考，不构成投资建议</p>
    </footer>
  </div>

  <script>
    // 密钥验证
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    const isOwner = (key === '7003');

    // 显示私密板块
    if (isOwner) {
      document.querySelectorAll('.private-sections').forEach(el => el.classList.add('show'));
    }

    // 板块切换
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
        this.classList.add('active');
        const section = this.getAttribute('data-section');
        document.getElementById('section-' + section).classList.add('active');
      });
    });

    // 加载文章列表
    function loadPosts(jsonUrl, listId, pathPrefix) {
      fetch(jsonUrl)
        .then(r => r.json())
        .then(posts => {
          const list = document.getElementById(listId);
          if (posts.length === 0) {
            list.innerHTML = '<li class="post-item" style="text-align:center;color:var(--text-muted);padding:40px 0;">暂无内容，等待更新 🐕</li>';
            return;
          }
          posts.forEach(p => {
            const date = new Date(p.date);
            const dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            const li = document.createElement('li');
            li.className = 'post-item';
            li.innerHTML = `
              <div class="post-date">${dateStr}</div>
              <div class="post-title"><a href="${pathPrefix}${p.slug}.html${isOwner ? '?key=7003' : ''}">${p.title}</a></div>
              <div class="post-desc">${p.desc}</div>
            `;
            list.appendChild(li);
          });
        })
        .catch(() => {
          document.getElementById(listId).innerHTML = '<li class="post-item" style="text-align:center;color:var(--text-muted);padding:40px 0;">暂无内容 🐕</li>';
        });
    }

    // 加载公开简报
    loadPosts('/daily-brief/posts/index.json', 'post-list', '/daily-brief/posts/');

    // 加载私密板块（仅密钥用户）
    if (isOwner) {
      loadPosts('/daily-brief/private/chain/index.json', 'chain-list', '/daily-brief/private/chain/');
      loadPosts('/daily-brief/private/launch/index.json', 'launch-list', '/daily-brief/private/launch/');
      loadPosts('/daily-brief/private/hkipo/index.json', 'hkipo-list', '/daily-brief/private/hkipo/');
    }
  </script>
</body>
</html>
