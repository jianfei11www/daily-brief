<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链研观察 — 区块链热点、全球宏观 · 科技前沿</title>
  <meta name="description" content="独立分析师视角 · 区块链热点、全球宏观 · 科技前沿 · 每日更新">
  <link rel="stylesheet" href="/daily-brief/css/style.css">
  <style>
    .section-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
      flex-wrap: wrap;
    }
    .section-tabs .tab {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
    }
    .section-tabs .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .section-tabs .tab:hover {
      border-color: var(--accent);
    }
    .lock-badge {
      font-size: 11px;
      background: #fef2f2;
      color: #dc2626;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="site-header">
      <h1><a href="/daily-brief/">链研观察</a></h1>
      <div class="subtitle">
        独立分析师视角
        <span>·</span>
        区块链热点、全球宏观 · 科技前沿
        <span>·</span>
        每日更新
      </div>
    </header>

    <main>
      <!-- 板块导航 -->
      <div class="section-tabs" id="tabs">
        <a class="tab active" data-section="brief">📊 每日简报</a>
        <a class="tab hidden" data-section="chain-radar" id="tab-chain-radar">🔗 链上雷达 <span class="lock-badge">🔒</span></a>
        <a class="tab hidden" data-section="hkipo" id="tab-hkipo">🇭🇰 港股打新 <span class="lock-badge">🔒</span></a>
        <a class="tab hidden" data-section="stock" id="tab-stock">📈 股票投研 <span class="lock-badge">🔒</span></a>
      </div>

      <!-- 每日简报（公开） -->
      <div id="section-brief">
        <ul class="post-list" id="post-list">
        </ul>
      </div>

      <!-- 链上雷达（私密） -->
      <div id="section-chain-radar" class="hidden">
        <ul class="post-list">
          <li class="post-item" style="text-align:center;color:var(--text-muted);padding:40px 0;">待填空</li>
        </ul>
      </div>

      <!-- 港股打新（私密） -->
      <div id="section-hkipo" class="hidden">
        <ul class="post-list" id="hkipo-list">
        </ul>
      </div>

      <!-- 股票投研（私密） -->
      <div id="section-stock" class="hidden">
        <ul class="post-list" id="stock-list">
        </ul>
      </div>
    </main>

    <footer class="site-footer">
      <p>© 2026 链研观察 · 内容仅供参考，不构成投资建议</p>
    </footer>
  </div>

  <script>
    // 密钥验证
    var params = new URLSearchParams(window.location.search);
    var key = params.get('key');
    var isOwner = (key === '7003');

    // 显示私密板块标签
    if (isOwner) {
      document.getElementById('tab-chain-radar').classList.remove('hidden');
      document.getElementById('tab-hkipo').classList.remove('hidden');
      document.getElementById('tab-stock').classList.remove('hidden');
    }

    // 板块切换
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        // 隐藏所有板块
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.getElementById('section-brief').classList.add('hidden');
        document.getElementById('section-chain-radar').classList.add('hidden');
        document.getElementById('section-hkipo').classList.add('hidden');
        document.getElementById('section-stock').classList.add('hidden');

        // 显示选中板块
        this.classList.add('active');
        var section = this.getAttribute('data-section');
        document.getElementById('section-' + section).classList.remove('hidden');
      });
    });

    // 默认显示每日简报
    document.getElementById('section-brief').classList.remove('hidden');

    // 加载文章列表
    function loadPosts(jsonUrl, listId, pathPrefix) {
      fetch(jsonUrl)
        .then(function(r) { return r.json(); })
        .then(function(posts) {
          var list = document.getElementById(listId);
          if (posts.length === 0) {
            list.innerHTML = '<li class="post-item" style="text-align:center;color:var(--text-muted);padding:40px 0;">暂无内容，等待更新 🐕</li>';
            return;
          }
          posts.forEach(function(p) {
            var date = new Date(p.date);
            var dateStr = date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            var li = document.createElement('li');
            li.className = 'post-item';
            var href = pathPrefix + p.slug + '.html' + (isOwner ? '?key=7003' : '');
            li.innerHTML = '<div class="post-date">' + dateStr + '</div>' +
              '<div class="post-title"><a href="' + href + '">' + p.title + '</a></div>' +
              '<div class="post-desc">' + p.desc + '</div>';
            list.appendChild(li);
          });
        })
        .catch(function() {
          document.getElementById(listId).innerHTML = '<li class="post-item" style="text-align:center;color:var(--text-muted);padding:40px 0;">暂无内容 🐕</li>';
        });
    }

    // 加载公开简报
    loadPosts('/daily-brief/posts/index.json', 'post-list', '/daily-brief/posts/');

    // 加载私密板块（仅密钥用户）
    if (isOwner) {
      loadPosts('/daily-brief/private/hkipo/index.json', 'hkipo-list', '/daily-brief/private/hkipo/');
      loadPosts('/daily-brief/private/stock/index.json', 'stock-list', '/daily-brief/private/stock/');
    }
  </script>
</body>
</html>
